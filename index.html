/* ================================================================
   PUZZLE POOL
================================================================ */
const POOL_TARGET = 10;
// puzzlePool[d] = [{puzzle:{grid,solution}, completed:false}, ...]
const puzzlePool = { hard:[], expert:[], insane:[] };
const poolGenerating = { hard:false, expert:false, insane:false };

/* --- localStorage 永続化 --- */
function savePool() {
  try { localStorage.setItem('sudoku_pool', JSON.stringify(puzzlePool)); } catch(e) {}
}
function loadPool() {
  try {
    const raw = localStorage.getItem('sudoku_pool');
    if (!raw) return false;
    const data = JSON.parse(raw);
    const diffs = ['hard','expert','insane'];
    let loaded = false;
    diffs.forEach(d => {
      if (Array.isArray(data[d]) && data[d].length > 0) {
        // POOL_TARGET超過分をトリム（古いデータ対策）
        puzzlePool[d] = data[d].slice(0, POOL_TARGET);
        loaded = true;
      }
    });
    return loaded;
  } catch(e) { return false; }
}

function poolReadyCount(d) {
  return puzzlePool[d].filter(e => !e.completed).length;
}

function updatePoolUI(d) {
  const countEl = document.getElementById('pool-count-'+d);
  const card = document.getElementById('diff-card-'+d);
  const genBtn = document.getElementById('gen-btn-'+d);
  if (!countEl || !card) return;
  const total = puzzlePool[d].length;
  const done = puzzlePool[d].filter(e => e.completed).length;
  const generating = poolGenerating[d];
  const remaining = total - done;
  const remainingEl = document.getElementById('remaining-num-'+d);
  if (generating) {
    countEl.textContent = `生成中… ${total}/${POOL_TARGET}`;
    card.classList.add('not-ready');
    if (genBtn) genBtn.disabled = true;
    if (remainingEl) remainingEl.textContent = '…';
  } else {
    countEl.textContent = done > 0 ? `${done}/${total} クリア済` : `${total}問 準備完了`;
    card.classList.remove('not-ready');
    if (genBtn) genBtn.disabled = false;
    if (remainingEl) remainingEl.textContent = remaining;
  }
}

async function refillPool(d) {
  if (poolGenerating[d]) return;
  poolGenerating[d] = true;
  updatePoolUI(d);
  while (puzzlePool[d].length < POOL_TARGET) {
    const p = await generatePuzzle(d);
    puzzlePool[d].push({ puzzle: p, completed: false });
    updatePoolUI(d);
  }
  poolGenerating[d] = false;
  updatePoolUI(d);
  savePool();
}

async function regenerateDiff(d) {
  if (poolGenerating[d]) return;
  puzzlePool[d] = [];
  savePool();
  updatePoolUI(d);
  await refillPool(d);
}

function tryRegenerateDiff(d) {
  // savedGames を正として進行中チェック
  if (savedGames[d]) {
    if (!confirm('進行中の問題は破棄されます。\n新しい問題を生成しますか？')) return;
    clearSavedGame(d);
    if (state.difficulty === d) { state.puzzle = null; state.status = 'idle'; }
    updateContinueBtn();
  }
  regenerateDiff(d);
}

function startFromPool(d, idx) {
  if (idx === undefined) {
    idx = puzzlePool[d].findIndex(e => !e.completed);
    if (idx === -1) return;
  }
  const entry = puzzlePool[d][idx];
  if (!entry || entry.completed) return;
  state.poolIndex = idx;
  startNewGame(d, entry.puzzle);
}

function markPoolCompleted() {
  const d = state.difficulty;
  const idx = state.poolIndex;
  if (idx >= 0 && puzzlePool[d] && puzzlePool[d][idx]) {
    puzzlePool[d][idx].completed = true;
    updatePoolUI(d);
    savePool();
  }
}

/* パズル選択メニュー */
function togglePuzzleMenu() {
  const dd = document.getElementById('puzzle-menu-dropdown');
  const ov = document.getElementById('puzzle-menu-overlay');
  const isOpen = dd.classList.contains('show');
  if (isOpen) { closePuzzleMenu(); return; }
  buildPuzzleMenuGrid();

}

function closePuzzleMenu() {
  document.getElementById('puzzle-menu-dropdown').classList.remove('show');
  document.getElementById('puzzle-menu-overlay').classList.remove('show');
}

function buildPuzzleMenuGrid() {
  const grid = document.getElementById('puzzle-menu-grid');
  const title = document.getElementById('puzzle-menu-title');
  const d = state.difficulty;
  const info = DIFFICULTIES[d];
  const pool = puzzlePool[d];
  title.textContent = `${info.name} — 問題一覧`;
  grid.innerHTML = '';
  for (let i = 0; i < POOL_TARGET; i++) {
    const item = document.createElement('button');
    item.className = 'puzzle-menu-item';
    item.textContent = i + 1;
    if (i >= pool.length) {
      item.classList.add('empty');
    } else if (pool[i].completed) {
      item.classList.add('completed');
      item.onclick = null;
      item.style.pointerEvents = 'none';
    } else if (i === state.poolIndex) {
      item.classList.add('current');
      item.onclick = () => { closePuzzleMenu(); };
    } else {
      item.onclick = () => { closePuzzleMenu(); startFromPool(d, i); };
    }
    grid.appendChild(item);
  }
}

function updatePuzzleMenuBadge() {
  const badge = document.getElementById('puzzle-menu-badge');
  if (badge && state.poolIndex >= 0) badge.textContent = state.poolIndex + 1;
}

async function initPool() {
  const diffs = ['hard','expert','insane'];
  const hadSaved = loadPool();
  if (hadSaved) {
    // 保存済みプールを復元 → UIを更新するだけ
    diffs.forEach(d => updatePoolUI(d));
  } else {
    // 初回起動 → 全難易度を生成
    diffs.forEach(d => refillPool(d));
  }
}

function getBestTime(difficulty) {
  const records=loadRecords().filter(r=>r.difficulty===difficulty);
  if (!records.length) return null;
  return formatTime(Math.min(...records.map(r=>r.elapsed)));
}

function saveRecord() {
  const records=loadRecords();
  records.unshift({
    difficulty:state.difficulty, elapsed:state.elapsed,
    hints:state.hints, score:calcScore(),
    date:new Date().toISOString()
  });
  saveRecords(records.slice(0,200));
}

================================================================ */
async function startNewGame(difficulty, puzzle=null) {
  showScreen('game');
  const diff=DIFFICULTIES[difficulty];
  document.getElementById('diff-badge').textContent=diff.name;
  document.getElementById('diff-badge').style.background=diff.gradient;
  document.getElementById('timer-est').innerHTML=`目安<br>${diff.est}`;

  // numpad build
  const numpad=document.getElementById('numpad');
  numpad.innerHTML='';
  for (let n=1;n<=9;n++) {
    const btn=document.createElement('button');
    btn.className='num-btn'; btn.textContent=n;
    btn.onclick=()=>inputNumber(n);
    numpad.appendChild(btn);
  }

  document.getElementById('tp-undo').disabled=true;

  if (puzzle) {
    initState(puzzle, difficulty);
    buildBoard(); renderBoard(); renderTimer(); renderTimerState();
    updatePuzzleMenuBadge();
    return;
  }

  // 生成
  document.getElementById('loading').classList.add('show');
  const p = await generatePuzzle(difficulty);
  initState(p, difficulty);
  buildBoard(); renderBoard(); renderTimer(); renderTimerState();
  updatePuzzleMenuBadge();
  document.getElementById('loading').classList.remove('show');
}

/* ================================================================
   IMPORT
================================================================ */
function buildImportGrid() {
  const grid=document.getElementById('import-grid');
  grid.innerHTML='';
  for (let i=0;i<81;i++) {
    const input=document.createElement('input');
    input.type='tel'; input.maxLength=1; input.className='import-cell';
    input.oninput=(e)=>{
      const v=e.target.value.replace(/[^1-9]/g,'');
      e.target.value=v;
      if (v&&i<80) grid.children[i+1].focus();
    };
    input.onkeydown=(e)=>{
      if (e.key==='Backspace'&&!e.target.value&&i>0) grid.children[i-1].focus();
    };
    grid.appendChild(input);
  }
}

function openImport() {
  buildImportGrid();
  document.getElementById('import-sheet').classList.add('show');
}
function closeImport() {
  document.getElementById('import-sheet').classList.remove('show');
}

function doImport() {
  const inputs=document.getElementById('import-grid').children;
  const grid=Array.from(inputs).map(el=>parseInt(el.value)||0);
  const errEl=document.getElementById('import-error');
  errEl.textContent='';

  if (!isGridValid(grid)) { errEl.textContent='数独のルールに違反しています'; return; }
  const sol=solveGrid(grid);
  if (!sol) { errEl.textContent='解が存在しません'; return; }
  if (!hasUniqueSolution(grid)) { errEl.textContent='解が一意ではありません'; return; }

  const diff=document.getElementById('import-diff').value;
  closeImport();
  startNewGame(diff, {grid, solution:sol});
}

    el.className='confetti-piece';
    el.style.left=Math.random()*100+'vw';
    el.style.width=(Math.random()*8+4)+'px';
    el.style.height=(Math.random()*8+4)+'px';
    el.style.background=colors[~~(Math.random()*colors.length)];
    el.style.transform=`rotate(${Math.random()*360}deg)`;
    el.style.animationDuration=(Math.random()*2+1.5)+'s';
    el.style.animationDelay=(Math.random()*0.8)+'s';
    wrap.appendChild(el);
  }
  setTimeout(()=>wrap.innerHTML='', 4000);
}

/* ================================================================
   UTILS
================================================================ */
function formatTime(t) {
  const h=~~(t/3600),m=~~((t%3600)/60),s=t%60;
  return h>0?`${h}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`:`${m}:${String(s).padStart(2,'0')}`;
}

   VISIBILITY / BACKGROUND
================================================================ */
document.addEventListener('visibilitychange',()=>{
  if (document.hidden&&state.status==='playing') pauseGame();
});

================================================================ */

  navigator.serviceWorker.register('/sw.js').catch(()=>{});

/* ================================================================
   URL パラメータ処理（ショートカット対応）
================================================================ */
function handleUrlParams() {
  const params=new URLSearchParams(location.search);
  const diff=params.get('difficulty');
  if (diff&&DIFFICULTIES[diff]) { setTimeout(()=>startNewGame(diff), 300); return true; }
  return false;
}

/* ================================================================
   INIT
================================================================ */
/* ================================================================
   背景キャンバス描画
   ① ソフトグラデーション（白→薄ピンク→薄ブルー）
   ② 9×9 数独グリッド線（超薄）
   ③ 3×3 ブロック強調線
   ④ 微細ノイズ（バンディング防止）
================================================================ */
function drawBackground() {
  const canvas = document.getElementById('bg-canvas');
  if (!canvas) return;
  const dpr = window.devicePixelRatio || 1;
  const W = window.innerWidth, H = window.innerHeight;
  canvas.width  = W * dpr;
  canvas.height = H * dpr;
  canvas.style.width  = W + 'px';
  canvas.style.height = H + 'px';
  const ctx = canvas.getContext('2d');
  ctx.scale(dpr, dpr);

  const dark = window.matchMedia('(prefers-color-scheme: dark)').matches;

  // ① グラデーション
  const grad = ctx.createLinearGradient(0, 0, W, H);
  if (dark) {
    grad.addColorStop(0,   '#1c1c1e');
    grad.addColorStop(0.5, '#1e1a22');
    grad.addColorStop(1,   '#1a1e26');
  } else {
    grad.addColorStop(0,   '#ffffff');
    grad.addColorStop(0.5, 'rgba(255,230,238,0.6)'); // 薄ピンク
    grad.addColorStop(1,   'rgba(225,238,255,0.6)'); // 薄ブルー
  }
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);

  // ② 微細ノイズ（高級感・バンディング防止）
  const imgData = ctx.getImageData(0, 0, W * dpr, H * dpr);
  const data = imgData.data;
  for (let i = 0; i < data.length; i += 4) {
    const noise = (Math.random() - 0.5) * 12;
    data[i]   = Math.min(255, Math.max(0, data[i]   + noise));
    data[i+1] = Math.min(255, Math.max(0, data[i+1] + noise));
    data[i+2] = Math.min(255, Math.max(0, data[i+2] + noise));
  }
  ctx.putImageData(imgData, 0, 0);
}

drawBackground();
window.addEventListener('resize', drawBackground);
window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', drawBackground);

window.addEventListener('load',()=>{
  buildHome();
  initPool();
  if (handleUrlParams()) return;

  // 難易度ごとの途中セーブ復元（確認なし・ホーム画面で「問題に戻る」を表示）
  const diffs = ['hard','expert','insane'];
  diffs.forEach(d => {
    const saved = loadGame(d);
    if (!saved) return;
    if (!DIFFICULTIES[saved.difficulty]) return;
    savedGames[d] = {
      puzzle: saved.puzzle,
      cells: saved.cells.map(c=>({...c, candidates:new Set(c.candidates)})),
      elapsed: saved.elapsed,
      hints: saved.hints,
      poolIndex: saved.poolIndex ?? -1,
      undoStack: saved.undoStack ?? [],
      status: 'paused'
    };
  });
  updateContinueBtn();
});
</script>
